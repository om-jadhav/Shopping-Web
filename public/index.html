<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>

  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/dashboard.css">
</head>

<body>

  <div class="tag">shopline</div>
  <div id="navLinks" class="nav-links"></div>

  <div class="card dashboard">

    <h1>Your Account</h1>
    <p class="subtitle">
      Manage your personal information and shipping address.
    </p>

    <!-- PROFILE COMPLETION -->
    <div class="profile-progress-card">

      <div class="progress-header">
        <span>Profile Completion</span>
        <span id="profilePercentage">0% Complete</span>
      </div>

      <div class="progress-bar">
        <div id="profileProgress" class="progress-fill"></div>
      </div>

    </div>

    <!-- COMPLETION CHECKLIST (added to fix missing IDs) -->
    <div class="profile-progress-card">
      <div class="progress-header">
        <span>Completion Breakdown</span>
        <span id="completionPercent">0%</span>
      </div>
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>
      <div id="completionChecklist" class="checklist"></div>
    </div>

    <form id="profileForm">

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="fullName" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" readonly>
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="phone" maxlength="10" pattern="[0-9]{10}" placeholder="9876543210">
      </div>

      <hr>

      <h3>Shipping Address</h3>

      <div class="form-group">
        <label>Address Line 1</label>
        <input type="text" id="address1">
      </div>

      <div class="form-group">
        <label>Address Line 2</label>
        <input type="text" id="address2">
      </div>

      <div class="form-group">
        <label>City</label>
        <input type="text" id="city">
      </div>

      <div class="form-group">
        <label>State</label>
        <input type="text" id="state">
      </div>

      <div class="form-group">
        <label>Postal Code</label>
        <input type="text" id="postalCode" maxlength="6" pattern="[0-9]{6}" placeholder="411001">
      </div>

      <div class="form-group">
        <label>Country</label>
        <input type="text" id="country">
      </div>

      <button type="submit">Save Changes</button>

    </form>

    <div id="msg" class="message"></div>

    <button onclick="window.location.href='/products.html'">
      Browse Products
    </button>

    <button id="logoutBtn" class="logout-btn">
      Log Out
    </button>

  </div>

  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/dashboard.js"></script>

</body>

</html>
