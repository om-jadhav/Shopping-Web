<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Custom Dashboard</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/admin.css" />
  <link rel="stylesheet" href="/css/custom-dashboard.css" />
  <link rel="stylesheet" href="/css/footer.css" />
</head>

<body class="page-admin">

  <div class="tag">IDK Clothing</div>

  <div class="admin-wrap">
    <!-- Header Navigation -->
    <div class="admin-header">
      <h1>Custom Dashboard</h1>
      <div class="links">
        <a href="/admin.html">Manage Products</a>
        <a href="/admin-orders.html">Store Orders</a> 
        <a href="/offers.html">Manage Offers</a>
        <a href="/completed-orders.html">Completed Orders</a>
        <a href="/products.html">View shop</a>
        <a href="#" id="logoutLink" class="logout-btn">Log out</a>
      </div>
    </div>

    <!-- ===== ADD / EDIT MATERIAL PANEL ===== -->
    <div class="panel panel-compact">
      <div class="panel-header panel-heading-row">
        <h2 id="formHeading">Add material</h2>
        <a href="#" id="cancelEditLink" class="cancel-link cancel-edit-link" style="display: none;">Cancel</a>
      </div>

      <form id="materialForm">
        <div class="field-row">
          <div class="form-group">
            <label for="materialName">Name *</label>
            <input id="materialName" type="text" placeholder="e.g., Cotton 100%" required />
          </div>

          <div class="form-group">
            <label for="materialStock">Stock qty *</label>
            <input id="materialStock" type="number" min="0" placeholder="50" required />
          </div>
        </div>

        <button type="submit" id="submitBtn" class="btn-primary">Add material</button>
        <div id="formMsg" class="message"></div>
      </form>
    </div>

    <!-- ===== EXISTING MATERIALS PANEL ===== -->
    <div class="panel">
      <h2>Existing materials</h2>
      <div id="materialList" class="material-list-container">Loading…</div>
    </div>

    <!-- ===== CUSTOM ORDERS PANEL ===== -->
    <div class="panel">
      <h2>Custom Orders</h2>
      <div id="customOrderList" class="custom-orders-container">
        <p class="stock-note">No custom orders yet — this section will populate once customers start placing custom t-shirt orders.</p>
      </div>
    </div>

  </div>

  <script src="/js/api.js"></script>
  <script src="/js/custom-dashboard.js"></script>
  <div id="siteFooter"></div>
  <script src="/js/footer.js"></script>
</body>

</html>
