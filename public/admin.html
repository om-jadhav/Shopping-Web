<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Manage Products</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/admin.css" />
  <link rel="stylesheet" href="/css/footer.css" />
</head>

<body class="page-admin">

  <div class="tag">IDK Clothing</div>

  <div class="admin-wrap">
    <div class="admin-header">
      <h1>Manage Products</h1>
      <div class="links">
        <a href="/offers.html" id="nav-offers">Manage Offers</a>
        <a href="/custom-dashboard.html">Custom Dashboard</a>
        <a href="/admin-orders.html">Store Orders</a> 
        <a href="/completed-orders.html">Completed Orders</a>
        <a href="/products.html">View shop</a>
        <a href="#" id="logoutLink" class="logout-btn">Log out</a>
      </div>
    </div>

    <!-- Product Form Panel -->
    <div class="panel">
      <div class="panel-header">
        <h2 id="formHeading">Add a new product</h2>
        <a href="#" id="cancelEditLink" style="display: none;" class="cancel-link">Cancel Edit</a>
      </div>

      <form id="productForm">
        <div class="form-group">
          <label for="name">Product Name *</label>
          <input id="name" type="text" placeholder="Classic Crew T-Shirt" required />
        </div>

        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" placeholder="100% cotton, regular fit."></textarea>
        </div>

        <div class="field-row">
          <div class="form-group">
            <label for="brand">Brand</label>
            <input id="brand" type="text" placeholder="Shopline" />
          </div>
          <div class="form-group">
            <label for="price">Price (₹) *</label>
            <input id="price" type="number" min="0" step="0.01" placeholder="799" required />
          </div>
        </div>

        <div class="field-row">
          <div class="form-group">
            <label for="gender">Gender</label>
            <select id="gender">
              <option value="unisex">Unisex</option>
              <option value="men">Men</option>
              <option value="women">Women</option>
              <option value="kids">Kids</option>
            </select>
          </div>
          <div class="form-group">
            <label for="category">Category</label>
            <select id="category"></select>
          </div>
        </div>

        <div class="form-group">
          <label for="productImages">Product Images * (Select up to 10)</label>
          <input id="productImages" type="file" accept="image/*" multiple required />
          <small class="help-text">
            Tip: Hold Ctrl (Win) or Cmd (Mac) to select multiple images.
          </small>
        </div>

        <!-- Newly Selected Local Images -->
        <div id="newImagesPreviewContainer" class="image-preview-container new-upload-box">
          <label>Newly Selected Images Preview:</label>
          <div id="newImagesPreviewGrid" class="image-preview-grid"></div>
        </div>

        <!-- Existing Active Product Images -->
        <div id="existingImagesContainer" class="image-preview-container">
          <label>Current Active Images (Click ✕ to remove):</label>
          <div id="existingImagesGrid" class="image-preview-grid"></div>
        </div>

        <div class="form-group">
          <label>Variants (size / color / stock)</label>
          <div class="variant-labels">
            <span>Size</span>
            <span>Color</span>
            <span>Stock</span>
            <span></span>
          </div>
          <div id="variantRows"></div>
          <button type="button" id="addVariantBtn" class="add-variant-btn">+ Add another variant</button>
        </div>

        <button type="submit" id="submitBtn" class="btn-primary">Create product</button>
        <div id="formMsg" class="message"></div>
      </form>
    </div>

    <!-- Existing Products Panel -->
    <div class="panel">
      <h2>Existing products</h2>
      <div id="productList" class="product-list-container">Loading…</div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/admin.js"></script>
  <div id="siteFooter"></div>
  <script src="/js/footer.js"></script>
</body>

</html>
